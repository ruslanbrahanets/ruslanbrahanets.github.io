  <!-- hire modal -->
  <div class="modal fade" id="hire-modal" tabindex="-1" role="dialog" aria-labelledby="hire-modal-label">
      <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
          <button type="button" class="close" data-dismiss="modal" aria-label="Close"><!-- <span aria-hidden="true">&times;</span> --></button>
          <div class="modal-header">
            <h4 class="modal-title" id="hire-modal-label">Hiring inquiry</h4>
          </div>
          <div class="modal-body">
            <div class="row">
              <div class="col-md-7">
                <div id="hire-img">
                  <img src="http://www.uiviking.com/wp-content/themes/ui_viking/assets/images/2-1/get-in-touch.svg" alt="Get in touch" class="img-responsive">
                </div>
                <form id="hire-form" method="POST">
                  <div class="form-group" id="client-name-wrapper">
                    <input type="text" name="contactName" class="form-control" id="client-name" placeholder="Your Name">
                  </div>
                  <div class="form-group" id="client-email-wrapper">
                    <input type="email" name="contactEmail" class="form-control" id="client-email" placeholder="Your email here*">
                  </div>
                  <div class="form-group" id="client-message-wrapper">
                    <textarea name="contactMessage" class="form-control" id="client-email" cols="30" rows="10" placeholder="Your message here"></textarea>
                  </div>
                  <div class="form-group"
                    <div class="button-box modal-btn-wrapper">
                      <input type="hidden" name="orderType" id="submitted" value="Request for HIRING" />
                      <button type="submit" form="hire-form" class="button button--size-form button--white modal-btn">Send request</button>
                    </div>
                  </div>
                </form>
              </div>
              <div class="col-md-5"></div>
            </div>
          </div>
          <div id="answer">
            <div class="row">
              <div class="col-md-12">
                <div id="hire-answer-img">
                  <img src="http://www.uiviking.com/wp-content/themes/ui_viking/assets/images/2-1/skal.svg" alt="SKAL!" class="img-responsive">
                </div>
                <div id="hire-answer-text"></div>
                <div class="button-box modal-btn-wrapper">
                  <button class="button button--size-s button--white modal-btn" data-dismiss="modal" aria-label="Close">Got it</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
